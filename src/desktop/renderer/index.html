<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>FitPet</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        user-select: none;
      }
      #stage {
        -webkit-app-region: drag; /* whole window is a drag handle */
        text-align: center;
      }
      /* Reserve space so the sprite never jumps when the bubble shows/hides. */
      #bubble-area {
        height: 78px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 6px 10px 0;
      }
      #bubble {
        position: relative;
        max-width: 220px;
        background: #f7f7f5;
        color: #22311f;
        border: 1px solid rgba(0, 0, 0, 0.18);
        border-radius: 12px;
        padding: 7px 11px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.35;
        word-break: break-word;
        opacity: 0;
        transform: translateY(4px);
        transition: opacity 0.15s ease, transform 0.15s ease;
      }
      #bubble.show {
        opacity: 1;
        transform: translateY(0);
      }
      #bubble::after {
        content: "";
        position: absolute;
        bottom: -7px;
        left: 50%;
        margin-left: -7px;
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-top: 7px solid #f7f7f5;
      }
      #pet-wrap {
        display: inline-block;
      }
      canvas {
        image-rendering: pixelated;
        display: block;
        margin: 4px auto 0;
      }
      #label {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        color: #c9d1d9;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        margin-top: 2px;
        opacity: 0; /* hidden at rest */
        transition: opacity 0.2s ease;
      }
      #stage:hover #label {
        opacity: 1; /* fades in only while hovering the window */
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="bubble-area"><div id="bubble"><span id="bubble-text"></span></div></div>
      <div id="pet-wrap"><canvas id="pet" width="256" height="256"></canvas></div>
      <div id="label">…</div>
    </div>
    <script type="module" src="./renderer.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>FitPet</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
        user-select: none;
      }
      #stage {
        -webkit-app-region: drag; /* whole window is a drag handle */
        text-align: center;
      }
      /* Reserve space so the sprite never jumps when the bubble shows/hides. */
      #bubble-area {
        height: 78px;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 6px 10px 0;
      }
      #bubble {
        position: relative;
        max-width: 220px;
        background: #f7f7f5;
        color: #22311f;
        border: 1px solid rgba(0, 0, 0, 0.18);
        border-radius: 12px;
        padding: 7px 11px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.35;
        word-break: break-word;
        opacity: 0;
        transform: translateY(4px);
        transition: opacity 0.15s ease, transform 0.15s ease;
      }
      #bubble.show {
        opacity: 1;
        transform: translateY(0);
      }
      #bubble::after {
        content: "";
        position: absolute;
        bottom: -7px;
        left: 50%;
        margin-left: -7px;
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-top: 7px solid #f7f7f5;
      }
      #pet-wrap {
        display: inline-block;
        will-change: transform;
      }
      canvas {
        image-rendering: pixelated;
        display: block;
        margin: 4px auto 0;
        transform-origin: 50% 90%; /* sway/bob pivots near the pot */
        will-change: transform;
      }
      #label {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        color: #c9d1d9;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        margin-top: 2px;
      }
      @keyframes bounce {
        0% { transform: translateY(0); }
        30% { transform: translateY(-10px); }
        60% { transform: translateY(0); }
        80% { transform: translateY(-4px); }
        100% { transform: translateY(0); }
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-5px); }
        40% { transform: translateX(5px); }
        60% { transform: translateX(-4px); }
        80% { transform: translateX(4px); }
      }
      @keyframes pop {
        0% { transform: scale(1); }
        50% { transform: scale(1.12); }
        100% { transform: scale(1); }
      }
      .bounce { animation: bounce 0.6s ease; }
      .shake { animation: shake 0.5s ease; }
      .pop { animation: pop 0.4s ease; }
      @keyframes idle-default { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
      @keyframes idle-cycling { 0% { transform: translateY(0) rotate(-2deg); } 25% { transform: translateY(-2px) rotate(0deg); } 50% { transform: translateY(0) rotate(2deg); } 75% { transform: translateY(-2px) rotate(0deg); } 100% { transform: translateY(0) rotate(-2deg); } }
      @keyframes idle-running { 0%, 100% { transform: translateY(0); } 25% { transform: translateY(-5px); } 50% { transform: translateY(0); } 75% { transform: translateY(-3px); } }
      @keyframes idle-swimming { 0% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } 100% { transform: rotate(-3deg); } }
      @keyframes idle-walking { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
      .idle-default { animation: idle-default 2.4s ease-in-out infinite; }
      .idle-cycling { animation: idle-cycling 1.1s linear infinite; }
      .idle-running { animation: idle-running 0.7s ease-in-out infinite; }
      .idle-swimming { animation: idle-swimming 2s ease-in-out infinite; }
      .idle-walking { animation: idle-walking 1.6s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="bubble-area"><div id="bubble"><span id="bubble-text"></span></div></div>
      <div id="pet-wrap"><canvas id="pet" width="128" height="128"></canvas></div>
      <div id="label">…</div>
    </div>
    <script type="module" src="./renderer.ts"></script>
  </body>
</html>
